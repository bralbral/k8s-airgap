---
name: Build offline bundle

"on":
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-offline-bundle
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Install crane
        run: |
          source config/versions.env
          curl --fail --location --retry 4 -o crane.tar.gz "https://github.com/google/go-containerregistry/releases/download/${CRANE_VERSION}/go-containerregistry_Linux_x86_64.tar.gz"
          tar -xzf crane.tar.gz crane
          sudo install -m 0755 crane /usr/local/bin/crane
      - name: Build bundle
        run: scripts/build-bundle.sh
      - name: Prepare release metadata
        id: release
        run: |
          source config/versions.env
          bundle_file="$(find dist -maxdepth 1 -type f -name '*.tar.zst' -print -quit)"
          test -n "${bundle_file}"
          bundle_name="$(basename "${bundle_file}")"
          bundle_size="$(du -h "${bundle_file}" | cut -f1)"
          bundle_sha256="$(sha256sum "${bundle_file}" | cut -d ' ' -f1)"
          printf '%s  %s\n' "${bundle_sha256}" "${bundle_name}" > "${bundle_file}.sha256"
          echo "tag=bundle-${KUBERNETES_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "title=Kubernetes Air-Gap Bundle ${KUBERNETES_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "bundle_name=${bundle_name}" >> "${GITHUB_OUTPUT}"
          echo "bundle_size=${bundle_size}" >> "${GITHUB_OUTPUT}"
          echo "bundle_sha256=${bundle_sha256}" >> "${GITHUB_OUTPUT}"
      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: k8s-airgap-bundle
          path: |
            dist/*.tar.zst
            dist/*.tar.zst.sha256
          retention-days: 14
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_TITLE: ${{ steps.release.outputs.title }}
          BUNDLE_NAME: ${{ steps.release.outputs.bundle_name }}
          BUNDLE_SIZE: ${{ steps.release.outputs.bundle_size }}
          BUNDLE_SHA256: ${{ steps.release.outputs.bundle_sha256 }}
        run: |
          source config/versions.env
          {
            echo "Ready-to-transfer offline Kubernetes installation bundle for Debian 12/amd64."
            echo
            echo "It contains pinned Kubernetes binaries, containerd, runc, CNI plugins, cluster images, operational tools, and Ansible automation for installing a cluster without internet access."
            echo
            echo "## Included versions"
            echo
            echo "| Component | Version |"
            echo "| --- | --- |"
            echo "| Kubernetes | ${KUBERNETES_VERSION} |"
            echo "| containerd | ${CONTAINERD_VERSION} |"
            echo "| runc | ${RUNC_VERSION} |"
            echo "| crictl | ${CRICTL_VERSION} |"
            echo "| CNI plugins | ${CNI_PLUGINS_VERSION} |"
            echo "| Flannel | ${FLANNEL_VERSION} |"
            echo "| Flannel CNI plugin | ${FLANNEL_CNI_PLUGIN_VERSION} |"
            echo "| Local-path provisioner | ${LOCAL_PATH_PROVISIONER_VERSION} |"
            echo "| BusyBox helper | ${BUSYBOX_VERSION} |"
            echo "| Helm | ${HELM_VERSION} |"
            echo "| K9s | ${K9S_VERSION} |"
            echo
            echo "## Assets"
            echo
            echo "- \`${BUNDLE_NAME}\` — complete offline bundle (${BUNDLE_SIZE})"
            echo "- \`${BUNDLE_NAME}.sha256\` — SHA-256 checksum"
            echo
            echo "**SHA-256:** \`${BUNDLE_SHA256}\`"
            echo
            echo "## Verify and unpack"
            echo
            echo '```bash'
            echo "sha256sum -c ${BUNDLE_NAME}.sha256"
            echo "tar --zstd -xf ${BUNDLE_NAME}"
            echo '```'
            echo
            echo "Generated manually by the GitHub Actions workflow \`build-bundle.yml\`."
          } > release-notes.md

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" \
              --title "${RELEASE_TITLE}" \
              --notes-file release-notes.md \
              --latest
            gh release upload "${RELEASE_TAG}" \
              dist/*.tar.zst dist/*.tar.zst.sha256 \
              --clobber
          else
            gh release create "${RELEASE_TAG}" \
              dist/*.tar.zst dist/*.tar.zst.sha256 \
              --target "${GITHUB_SHA}" \
              --title "${RELEASE_TITLE}" \
              --notes-file release-notes.md \
              --latest
          fi
