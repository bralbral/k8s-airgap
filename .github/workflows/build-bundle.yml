---
name: Build offline bundle

"on":
  workflow_dispatch:
  push:
    tags: ['bundle-v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Install crane
        run: |
          source config/versions.env
          curl --fail --location --retry 4 -o crane.tar.gz "https://github.com/google/go-containerregistry/releases/download/${CRANE_VERSION}/go-containerregistry_Linux_x86_64.tar.gz"
          tar -xzf crane.tar.gz crane
          sudo install -m 0755 crane /usr/local/bin/crane
      - name: Build bundle
        run: scripts/build-bundle.sh
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: k8s-airgap-bundle
          path: dist/*.tar.zst
          retention-days: 14
      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" dist/*.tar.zst --generate-notes
